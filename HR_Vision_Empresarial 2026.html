<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HR Visión Empresarial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b2a;--navy2:#1b2e45;--teal:#1a7a8a;--teal2:#25a0b5;
  --amber:#f59e0b;--amber2:#fbbf24;--red:#ef4444;--green:#22c55e;
  --white:#f8fafc;--gray1:#e2e8f0;--gray2:#94a3b8;--gray3:#475569;
  --card:rgba(255,255,255,0.05);--card-border:rgba(255,255,255,0.1);
  --radius:14px;--shadow:0 4px 24px rgba(0,0,0,0.3);
}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;min-height:100vh;background:var(--navy2);border-right:1px solid var(--card-border);display:flex;flex-direction:column;padding:28px 0;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:0 24px 28px;border-bottom:1px solid var(--card-border)}
.sidebar-logo h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--teal2);line-height:1.2}
.sidebar-logo p{font-size:11px;color:var(--gray2);margin-top:4px}
.sidebar-nav{padding:16px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--gray2);transition:all .18s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.nav-item:hover{color:var(--white);background:var(--card)}
.nav-item.active{color:var(--teal2);background:rgba(26,122,138,0.18);font-weight:600}
.main{flex:1;padding:32px;overflow-y:auto;min-width:0}
.page-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px}
.page-sub{color:var(--gray2);font-size:14px;margin-bottom:28px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.teal::before{background:var(--teal2)}
.stat-card.amber::before{background:var(--amber)}
.stat-card.green::before{background:var(--green)}
.stat-card.red::before{background:var(--red)}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray2);font-weight:600}
.stat-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-top:6px}
.stat-sub{font-size:11.5px;color:var(--gray2);margin-top:3px}
.table-wrap{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden}
.table-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--card-border);gap:12px;flex-wrap:wrap}
.table-header h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.search-box{background:var(--navy);border:1px solid var(--card-border);border-radius:8px;padding:8px 14px;color:var(--white);font-size:13px;width:220px;outline:none;font-family:'DM Sans',sans-serif}
.search-box:focus{border-color:var(--teal2)}
.search-box::placeholder{color:var(--gray2)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray2);font-weight:600;padding:12px 16px;text-align:left;background:rgba(0,0,0,0.15)}
td{padding:13px 16px;font-size:13.5px;border-top:1px solid var(--card-border);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,0.03)}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:600}
.badge.paid{background:rgba(34,197,94,0.15);color:var(--green)}
.badge.partial{background:rgba(245,158,11,0.15);color:var(--amber2)}
.badge.pending{background:rgba(239,68,68,0.15);color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .16s}
.btn-primary{background:var(--teal);color:white}
.btn-primary:hover{background:var(--teal2);transform:translateY(-1px)}
.btn-amber{background:var(--amber);color:var(--navy)}
.btn-amber:hover{background:var(--amber2)}
.btn-green{background:rgba(34,197,94,0.18);color:var(--green);border:1px solid rgba(34,197,94,0.3)}
.btn-green:hover{background:rgba(34,197,94,0.32)}
.btn-ghost{background:transparent;color:var(--gray2);border:1px solid var(--card-border)}
.btn-ghost:hover{color:var(--white);border-color:var(--gray2)}
.btn-danger{background:rgba(239,68,68,0.15);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,0.3)}
.btn-sm{padding:6px 12px;font-size:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.modal{background:var(--navy2);border:1px solid var(--card-border);border-radius:18px;width:100%;max-width:780px;box-shadow:var(--shadow);margin:auto}
.modal-head{padding:22px 28px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.modal-body{padding:26px 28px;max-height:72vh;overflow-y:auto}
.modal-foot{padding:18px 28px;border-top:1px solid var(--card-border);display:flex;gap:10px;justify-content:flex-end}
.form-section{margin-bottom:22px}
.form-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--teal2);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-section-title::after{content:'';flex:1;height:1px;background:var(--card-border)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11.5px;color:var(--gray2);font-weight:500}
.form-group input,.form-group select{background:var(--navy);border:1px solid var(--card-border);border-radius:8px;padding:9px 12px;color:var(--white);font-size:13.5px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--teal2)}
.form-group select option{background:var(--navy2)}
.input-abono{border-color:rgba(34,197,94,0.4)!important;background:rgba(34,197,94,0.05)!important}
.input-abono:focus{border-color:var(--green)!important}
.input-saldo-ok{border-color:rgba(34,197,94,0.3)!important;background:rgba(34,197,94,0.07)!important;color:var(--green)!important;font-weight:700}
.input-saldo-warn{border-color:rgba(245,158,11,0.35)!important;background:rgba(245,158,11,0.07)!important;color:var(--amber2)!important;font-weight:700}
.input-saldo-bad{border-color:rgba(239,68,68,0.3)!important;background:rgba(239,68,68,0.06)!important;color:var(--red)!important;font-weight:700}
.formula-table{width:100%;border-collapse:collapse}
.formula-table th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray2);font-weight:600;padding:8px 10px;text-align:center;background:rgba(0,0,0,0.2)}
.formula-table td{padding:6px 8px}
.formula-table td input{width:100%;background:var(--navy);border:1px solid var(--card-border);border-radius:6px;padding:7px 8px;color:var(--white);font-size:13px;outline:none;text-align:center;font-family:'DM Sans',sans-serif}
.formula-table td input:focus{border-color:var(--teal2)}
.eye-label{font-size:12px;font-weight:700;color:var(--teal2);text-align:center;padding:6px 12px}
.detail-section{margin-bottom:20px}
.detail-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--gray2);margin-bottom:12px;font-weight:600}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
.detail-item{background:var(--navy);border-radius:10px;padding:12px 15px}
.detail-item .di-label{font-size:11px;color:var(--gray2)}
.detail-item .di-value{font-size:15px;font-weight:600;margin-top:2px}
.abono-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.abono-item{display:flex;justify-content:space-between;align-items:center;background:var(--navy);border-radius:8px;padding:10px 14px;gap:10px}
.abono-amount{font-weight:700;color:var(--green)}
.abono-date{font-size:12px;color:var(--gray2);flex:1;text-align:right}
.abono-row{display:flex;gap:10px;align-items:flex-end;margin-top:12px}
.abono-row .form-group{flex:1}
.saldo-resumen{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;background:rgba(0,0,0,0.18);border-radius:12px;padding:14px;margin-top:12px}
.sr-item{text-align:center}
.sr-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--gray2);font-weight:600}
.sr-value{font-size:16px;font-weight:800;margin-top:3px;font-family:'Syne',sans-serif}
.progress-bar{background:rgba(255,255,255,0.08);border-radius:99px;height:6px;margin-top:10px}
.progress-fill{height:100%;border-radius:99px;background:var(--teal2);transition:width .4s}
.progress-fill.done{background:var(--green)}
.progress-fill.warn{background:var(--amber)}
.empty{text-align:center;padding:60px 20px;color:var(--gray2)}
.empty p{font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy2);border:1px solid var(--teal2);border-radius:10px;padding:12px 20px;font-size:13.5px;z-index:200;box-shadow:var(--shadow);animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.color-teal{color:var(--teal2)}.color-green{color:var(--green)}.color-red{color:var(--red)}.color-amber{color:var(--amber2)}
.action-btns{display:flex;gap:6px}
.filter-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-select{background:var(--navy);border:1px solid var(--card-border);border-radius:8px;padding:8px 12px;color:var(--white);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.import-input{display:none}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
@media(max-width:768px){.sidebar{width:60px}.sidebar-logo,.nav-label{display:none}.nav-item{justify-content:center;padding:12px}.main{padding:16px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const fmt = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);
const todayStr = () => new Date().toISOString().slice(0,10);
const uid = () => Math.random().toString(36).slice(2,9);
const emptyFormula = () => ({esfera:'',cilindro:'',eje:'',adicion:''});
const emptyPatient = () => ({
  id:uid(),nombre:'',cedula:'',telefono:'',ciudad:'',fechaVenta:todayStr(),
  od:emptyFormula(),oi:emptyFormula(),
  montura:'',referencia:'',
  precioLentes:'',precioMontura:'',costoLab:'',costoMontura:'',
  abonoInicial:'', abonos:[]
});

const totalVenta   = p => (parseFloat(p.precioLentes)||0)+(parseFloat(p.precioMontura)||0);
const totalCosto   = p => (parseFloat(p.costoLab)||0)+(parseFloat(p.costoMontura)||0);
const ganancia     = p => totalVenta(p)-totalCosto(p);
const totalAbonado = p => p.abonos.reduce((s,a)=>s+a.monto,0);
const saldo        = p => totalVenta(p)-totalAbonado(p);
const estadoPago   = p => {
  const tv=totalVenta(p),ta=totalAbonado(p);
  if(tv===0) return 'pending';
  if(ta>=tv) return 'paid';
  if(ta>0)   return 'partial';
  return 'pending';
};

const KEY = 'hr_vision_patients';
const loadP = () => { try{const d=localStorage.getItem(KEY);return d?JSON.parse(d):[]}catch{return []} };
const saveP = l => { try{localStorage.setItem(KEY,JSON.stringify(l))}catch{} };

function exportExcel(patients){
  const rows=patients.map(p=>({
    'Nombre':p.nombre,'Cédula':p.cedula,'Teléfono':p.telefono,'Ciudad':p.ciudad,'Fecha Venta':p.fechaVenta,
    'OD Esfera':p.od.esfera,'OD Cilindro':p.od.cilindro,'OD Eje':p.od.eje,'OD Adición':p.od.adicion,
    'OI Esfera':p.oi.esfera,'OI Cilindro':p.oi.cilindro,'OI Eje':p.oi.eje,'OI Adición':p.oi.adicion,
    'Montura':p.montura||'','Referencia Montura':p.referencia||'',
    'Precio Lentes':parseFloat(p.precioLentes)||0,'Precio Montura':parseFloat(p.precioMontura)||0,'Total Venta':totalVenta(p),
    'Costo Laboratorio':parseFloat(p.costoLab)||0,'Costo Montura':parseFloat(p.costoMontura)||0,'Total Costo':totalCosto(p),
    'Ganancia':ganancia(p),'Total Abonado':totalAbonado(p),'Saldo Pendiente':Math.max(0,saldo(p)),
    'Estado':{paid:'Pagado',partial:'Parcial',pending:'Pendiente'}[estadoPago(p)],
    'Abonos (detalle)':p.abonos.map(a=>`${a.fecha}: $${a.monto}`).join(' | '),
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=Object.keys(rows[0]||{}).map(()=>({wch:18}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Pacientes');
  XLSX.writeFile(wb,`HR_Vision_${todayStr()}.xlsx`);
}

// SVG Icons
const Ic = {
  eye:    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  plus:   <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  x:      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  dash:   <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
  people: <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  edit:   <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  trash:  <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
  coin:   <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4h8"/></svg>,
  excel:  <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>,
  upload: <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>,
};

function App(){
  const [patients,setPatients] = useState(loadP);
  const [view,setView]         = useState('dashboard');
  const [modal,setModal]       = useState(null);
  const [selected,setSelected] = useState(null);
  const [form,setForm]         = useState(emptyPatient());
  const [search,setSearch]     = useState('');
  const [filterE,setFE]        = useState('all');
  const [abonoVal,setAbonoVal] = useState('');
  const [abonoFecha,setAbonoF] = useState(todayStr());
  const [toast,setToast]       = useState(null);
  const importRef              = useRef();

  useEffect(()=>saveP(patients),[patients]);
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null),2800); };

  const stats = useMemo(()=>({
    count:patients.length,
    total:patients.reduce((s,p)=>s+totalVenta(p),0),
    cobrado:patients.reduce((s,p)=>s+totalAbonado(p),0),
    pendiente:patients.reduce((s,p)=>s+Math.max(0,saldo(p)),0),
    gan:patients.reduce((s,p)=>s+ganancia(p),0),
  }),[patients]);

  const filtered = useMemo(()=>patients.filter(p=>{
    const q=search.toLowerCase();
    const m=!q||p.nombre.toLowerCase().includes(q)||p.cedula.includes(q)||p.ciudad.toLowerCase().includes(q)||p.telefono.includes(q);
    return m&&(filterE==='all'||estadoPago(p)===filterE);
  }).sort((a,b)=>b.fechaVenta.localeCompare(a.fechaVenta)),[patients,search,filterE]);

  const setF  = (k,v) => setForm(f=>({...f,[k]:v}));
  const setFx = (eye,k,v) => setForm(f=>({...f,[eye]:{...f[eye],[k]:v}}));

  const openNew    = ()  => { setForm(emptyPatient()); setModal('new'); };
  const openEdit   = p   => { setForm({...p,abonos:[...p.abonos],abonoInicial:''}); setModal('edit'); };
  const openDetail = p   => { setSelected(p); setModal('detail'); setAbonoVal(''); setAbonoF(todayStr()); };

  const save = () => {
    if(!form.nombre.trim()){ showToast('⚠️ El nombre es requerido'); return; }
    const ai = parseFloat(form.abonoInicial)||0;
    let finalForm = {...form, abonoInicial:''};
    if(modal==='new' && ai>0){
      finalForm={...finalForm, abonos:[{id:uid(),monto:ai,fecha:form.fechaVenta}]};
    }
    if(modal==='new') setPatients(prev=>[{...finalForm,id:uid()},...prev]);
    else              setPatients(prev=>prev.map(p=>p.id===form.id?finalForm:p));
    showToast(modal==='new'?'✅ Paciente registrado':'✅ Paciente actualizado');
    setModal(null);
  };

  const del = id => { setPatients(prev=>prev.filter(p=>p.id!==id)); showToast('🗑️ Eliminado'); setModal(null); };

  const addAbono = () => {
    const monto=parseFloat(abonoVal);
    if(!monto||monto<=0){ showToast('⚠️ Valor inválido'); return; }
    setPatients(prev=>prev.map(p=>{
      if(p.id!==selected.id) return p;
      const u={...p,abonos:[...p.abonos,{id:uid(),monto,fecha:abonoFecha}]};
      setSelected(u); return u;
    }));
    setAbonoVal(''); showToast('✅ Abono registrado');
  };

  const delAbono = (pid,aid) => setPatients(prev=>prev.map(p=>{
    if(p.id!==pid) return p;
    const u={...p,abonos:p.abonos.filter(a=>a.id!==aid)};
    setSelected(u); return u;
  }));

  const handleImport = e => {
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        const imp=rows.map(r=>({
          id:uid(),nombre:r['Nombre']||'',cedula:String(r['Cédula']||''),telefono:String(r['Teléfono']||''),
          ciudad:r['Ciudad']||'',fechaVenta:r['Fecha Venta']||todayStr(),abonoInicial:'',
          od:{esfera:String(r['OD Esfera']||''),cilindro:String(r['OD Cilindro']||''),eje:String(r['OD Eje']||''),adicion:String(r['OD Adición']||'')},
          oi:{esfera:String(r['OI Esfera']||''),cilindro:String(r['OI Cilindro']||''),eje:String(r['OI Eje']||''),adicion:String(r['OI Adición']||'')},
          precioLentes:r['Precio Lentes']||'',precioMontura:r['Precio Montura']||'',
          costoLab:r['Costo Laboratorio']||'',costoMontura:r['Costo Montura']||'',
          abonos:r['Abonos (detalle)']?String(r['Abonos (detalle)']).split('|').filter(Boolean).map(s=>{
            const[fecha,resto]=(s.trim()).split(':');
            return{id:uid(),fecha:fecha.trim(),monto:parseFloat((resto||'0').replace(/[^0-9.]/g,''))||0};
          }):[],
        }));
        if(confirm(`¿Importar ${imp.length} registros? Se añadirán a los actuales.`)){
          setPatients(prev=>[...prev,...imp]);
          showToast(`✅ ${imp.length} registros importados`);
        }
      }catch{ showToast('❌ Error al leer el archivo'); }
    };
    reader.readAsBinaryString(file);
    e.target.value='';
  };

  const ExcelBtns = ()=>(
    <div style={{display:'flex',gap:8}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>importRef.current.click()}>{Ic.upload} Importar Excel</button>
      <button className="btn btn-green btn-sm" onClick={()=>exportExcel(patients)}>{Ic.excel} Exportar Excel</button>
    </div>
  );

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <h1>👁️ HR Visión<br/>Empresarial</h1>
          <p>Gestión de ventas</p>
        </div>
        <nav className="sidebar-nav">
          {[{id:'dashboard',icon:'dash',label:'Dashboard'},{id:'patients',icon:'people',label:'Pacientes'}].map(n=>(
            <button key={n.id} className={`nav-item${view===n.id?' active':''}`} onClick={()=>setView(n.id)}>
              {Ic[n.icon]}<span className="nav-label">{n.label}</span>
            </button>
          ))}
        </nav>
      </aside>
      <main className="main">
        {view==='dashboard' && <Dashboard stats={stats} patients={patients} openDetail={openDetail} ExcelBtns={ExcelBtns}/>}
        {view==='patients'  && <PatientsView filtered={filtered} search={search} setSearch={setSearch} filterE={filterE} setFE={setFE} openNew={openNew} openEdit={openEdit} openDetail={openDetail} ExcelBtns={ExcelBtns}/>}
      </main>
      {(modal==='new'||modal==='edit')&&<PatientModal form={form} setF={setF} setFx={setFx} modal={modal} onSave={save} onClose={()=>setModal(null)}/>}
      {modal==='detail'&&selected&&(
        <DetailModal p={patients.find(x=>x.id===selected.id)||selected}
          abonoVal={abonoVal} setAbonoVal={setAbonoVal} abonoFecha={abonoFecha} setAbonoF={setAbonoF}
          onAddAbono={addAbono} onDelAbono={delAbono}
          onEdit={()=>openEdit(patients.find(x=>x.id===selected.id))}
          onDelete={()=>del(selected.id)} onClose={()=>setModal(null)}/>
      )}
      {toast&&<div className="toast">{toast}</div>}
      <input ref={importRef} className="import-input" type="file" accept=".xlsx,.xls" onChange={handleImport}/>
    </div>
  );
}

function Dashboard({stats,patients,openDetail,ExcelBtns}){
  const recent  = [...patients].sort((a,b)=>b.fechaVenta.localeCompare(a.fechaVenta)).slice(0,8);
  const pending = patients.filter(p=>saldo(p)>0).sort((a,b)=>saldo(b)-saldo(a)).slice(0,5);
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
        <div><div className="page-title">Dashboard</div><div className="page-sub">Resumen general — HR Visión Empresarial</div></div>
        <ExcelBtns/>
      </div>
      <div className="stats-grid">
        {[['👥','Total pacientes',stats.count,'registrados','teal'],
          ['🧾','Total ventas',fmt(stats.total),'precio facturado','teal'],
          ['✅','Total cobrado',fmt(stats.cobrado),'abonos acumulados','green'],
          ['⏳','Por cobrar',fmt(stats.pendiente),'saldo pendiente','red'],
          ['📈','Ganancia bruta',fmt(stats.gan),'venta − costo','amber']
        ].map(([icon,label,value,sub,color])=>(
          <div key={label} className={`stat-card ${color}`}>
            <div className="stat-label">{icon} {label}</div>
            <div className="stat-value">{value}</div>
            <div className="stat-sub">{sub}</div>
          </div>
        ))}
      </div>
      <div className="dash-grid">
        <div className="table-wrap">
          <div className="table-header"><h3>🕐 Ventas recientes</h3></div>
          {recent.length===0?<div className="empty"><p>Sin registros aún</p></div>:(
            <table><thead><tr><th>Paciente</th><th>Fecha</th><th>Total</th><th>Estado</th></tr></thead>
              <tbody>{recent.map(p=>(
                <tr key={p.id} style={{cursor:'pointer'}} onClick={()=>openDetail(p)}>
                  <td>{p.nombre}</td>
                  <td style={{color:'var(--gray2)',fontSize:12}}>{p.fechaVenta}</td>
                  <td className="color-teal" style={{fontWeight:600}}>{fmt(totalVenta(p))}</td>
                  <td><Badge p={p}/></td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
        <div className="table-wrap">
          <div className="table-header"><h3>⚠️ Mayores saldos</h3></div>
          {pending.length===0?<div className="empty"><p>¡Sin saldos! 🎉</p></div>:(
            <table><thead><tr><th>Paciente</th><th>Total</th><th>Saldo</th></tr></thead>
              <tbody>{pending.map(p=>{
                const tv=totalVenta(p),ta=totalAbonado(p),pct=tv?(ta/tv)*100:0;
                return(
                  <tr key={p.id} style={{cursor:'pointer'}} onClick={()=>openDetail(p)}>
                    <td>{p.nombre}</td>
                    <td style={{fontSize:12,color:'var(--gray2)'}}>{fmt(tv)}</td>
                    <td><span className="color-red" style={{fontWeight:700}}>{fmt(saldo(p))}</span>
                      <div className="progress-bar" style={{marginTop:5}}><div className="progress-fill" style={{width:`${pct}%`}}/></div>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

function PatientsView({filtered,search,setSearch,filterE,setFE,openNew,openEdit,openDetail,ExcelBtns}){
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
        <div><div className="page-title">Pacientes</div><div className="page-sub">Registro de ventas individuales</div></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
          <ExcelBtns/>
          <button className="btn btn-primary" onClick={openNew}>{Ic.plus} Nuevo paciente</button>
        </div>
      </div>
      <div className="table-wrap">
        <div className="table-header">
          <h3>Todos los registros ({filtered.length})</h3>
          <div className="filter-row">
            <input className="search-box" placeholder="Buscar nombre, cédula, ciudad…" value={search} onChange={e=>setSearch(e.target.value)}/>
            <select className="filter-select" value={filterE} onChange={e=>setFE(e.target.value)}>
              <option value="all">Todos</option><option value="paid">Pagado</option>
              <option value="partial">Parcial</option><option value="pending">Pendiente</option>
            </select>
          </div>
        </div>
        {filtered.length===0?<div className="empty"><p>No hay registros. ¡Agrega el primer paciente!</p></div>:(
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr><th>Paciente</th><th>Ciudad</th><th>Fecha</th><th>Venta</th><th>Abonado</th><th>Saldo</th><th>Ganancia</th><th>Estado</th><th></th></tr></thead>
              <tbody>{filtered.map(p=>{
                const tv=totalVenta(p),ta=totalAbonado(p),sd=saldo(p),gn=ganancia(p);
                return(
                  <tr key={p.id}>
                    <td><div style={{fontWeight:600}}>{p.nombre}</div><div style={{fontSize:11.5,color:'var(--gray2)'}}>CC {p.cedula||'—'}</div></td>
                    <td style={{color:'var(--gray2)',fontSize:13}}>{p.ciudad||'—'}</td>
                    <td style={{color:'var(--gray2)',fontSize:13}}>{p.fechaVenta}</td>
                    <td className="color-teal" style={{fontWeight:600}}>{fmt(tv)}</td>
                    <td className="color-green">{fmt(ta)}</td>
                    <td className={sd>0?'color-red':'color-green'} style={{fontWeight:sd>0?700:400}}>{fmt(Math.max(0,sd))}</td>
                    <td className={gn>=0?'color-amber':'color-red'}>{fmt(gn)}</td>
                    <td><Badge p={p}/></td>
                    <td><div className="action-btns">
                      <button className="btn btn-ghost btn-sm" onClick={()=>openDetail(p)}>{Ic.eye}</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(p)}>{Ic.edit}</button>
                    </div></td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

function Badge({p}){
  const e=estadoPago(p);
  return <span className={`badge ${e}`}>{e==='paid'?'Pagado':e==='partial'?'Parcial':'Pendiente'}</span>;
}

function PatientModal({form,setF,setFx,modal,onSave,onClose}){
  const gn=ganancia(form);
  const tv=totalVenta(form);
  const ai=parseFloat(form.abonoInicial)||0;
  const sd=Math.max(0,tv-ai);
  const pct=tv>0?Math.min(100,(ai/tv)*100):0;
  const saldoCls=sd===0&&tv>0?'input-saldo-ok':ai>0&&sd>0?'input-saldo-warn':'input-saldo-bad';

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h2>{modal==='new'?'➕ Nuevo paciente':'✏️ Editar paciente'}</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>{Ic.x}</button>
        </div>
        <div className="modal-body">

          <div className="form-section">
            <div className="form-section-title">Datos del paciente</div>
            <div className="form-grid">
              <div className="form-group" style={{gridColumn:'span 2'}}>
                <label>Nombre completo *</label>
                <input value={form.nombre} onChange={e=>setF('nombre',e.target.value)} placeholder="Nombre del paciente"/>
              </div>
              <div className="form-group"><label>Cédula</label><input value={form.cedula} onChange={e=>setF('cedula',e.target.value)} placeholder="Número de cédula"/></div>
              <div className="form-group"><label>Teléfono</label><input value={form.telefono} onChange={e=>setF('telefono',e.target.value)} placeholder="3XX XXX XXXX"/></div>
              <div className="form-group"><label>Ciudad</label><input value={form.ciudad} onChange={e=>setF('ciudad',e.target.value)} placeholder="Ciudad"/></div>
              <div className="form-group"><label>Fecha de venta</label><input type="date" value={form.fechaVenta} onChange={e=>setF('fechaVenta',e.target.value)}/></div>
            </div>
          </div>

          <div className="form-section">
            <div className="form-section-title">Fórmula óptica</div>
            <table className="formula-table">
              <thead><tr><th></th><th>Esfera</th><th>Cilindro</th><th>Eje</th><th>Adición</th></tr></thead>
              <tbody>
                {[['od','👁 OD'],['oi','👁 OI']].map(([eye,lbl])=>(
                  <tr key={eye}><td className="eye-label">{lbl}</td>
                    {['esfera','cilindro','eje','adicion'].map(k=>(
                      <td key={k}><input value={form[eye][k]} onChange={e=>setFx(eye,k,e.target.value)} placeholder="—"/></td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="form-section">
            <div className="form-section-title">Precios de venta</div>
            <div className="form-grid">
              <div className="form-group"><label>Montura (marca / nombre)</label><input value={form.montura} onChange={e=>setF('montura',e.target.value)} placeholder="Ej: Ray-Ban, Oakley…"/></div>
              <div className="form-group"><label>Referencia de montura</label><input value={form.referencia} onChange={e=>setF('referencia',e.target.value)} placeholder="Ej: RB3025, código…"/></div>
              <div className="form-group"><label>Precio lentes ($)</label><input type="number" value={form.precioLentes} onChange={e=>setF('precioLentes',e.target.value)} placeholder="0"/></div>
              <div className="form-group"><label>Precio montura ($)</label><input type="number" value={form.precioMontura} onChange={e=>setF('precioMontura',e.target.value)} placeholder="0"/></div>
              <div className="form-group"><label style={{color:'var(--teal2)'}}>Total venta</label><input readOnly value={fmt(tv)} style={{color:'var(--teal2)',fontWeight:700,background:'rgba(26,122,138,0.08)'}}/></div>
            </div>
          </div>

          <div className="form-section">
            <div className="form-section-title">Costos</div>
            <div className="form-grid">
              <div className="form-group"><label>Costo laboratorio ($)</label><input type="number" value={form.costoLab} onChange={e=>setF('costoLab',e.target.value)} placeholder="0"/></div>
              <div className="form-group"><label>Costo montura ($)</label><input type="number" value={form.costoMontura} onChange={e=>setF('costoMontura',e.target.value)} placeholder="0"/></div>
              <div className="form-group"><label style={{color:gn>=0?'var(--amber2)':'var(--red)'}}>Ganancia estimada</label><input readOnly value={fmt(gn)} style={{color:gn>=0?'var(--amber2)':'var(--red)',fontWeight:700,background:gn>=0?'rgba(245,158,11,0.08)':'rgba(239,68,68,0.08)'}}/></div>
            </div>
          </div>

          {/* ═══ ABONO INICIAL + SALDO ═══════════════════════════════ */}
          <div className="form-section">
            <div className="form-section-title">💵 Abono y saldo</div>
            <div className="form-grid">
              <div className="form-group">
                <label>Abono inicial ($) — lo que paga hoy</label>
                <input className="input-abono" type="number" value={form.abonoInicial}
                  onChange={e=>setF('abonoInicial',e.target.value)} placeholder="0"/>
              </div>
              <div className="form-group">
                <label>Saldo pendiente (calculado)</label>
                <input readOnly className={tv>0?(sd===0?'input-saldo-ok':ai>0?'input-saldo-warn':'input-saldo-bad'):''} value={tv>0?fmt(sd):'—'}/>
              </div>
            </div>

            {tv>0&&(
              <>
                <div className="saldo-resumen">
                  <div className="sr-item">
                    <div className="sr-label">Total venta</div>
                    <div className="sr-value color-teal">{fmt(tv)}</div>
                  </div>
                  <div className="sr-item">
                    <div className="sr-label">Abono hoy</div>
                    <div className="sr-value color-green">{fmt(ai)}</div>
                  </div>
                  <div className="sr-item">
                    <div className="sr-label">Queda debiendo</div>
                    <div className="sr-value" style={{color:sd===0?'var(--green)':ai>0?'var(--amber2)':'var(--red)'}}>{fmt(sd)}</div>
                  </div>
                </div>
                <div className="progress-bar" style={{marginTop:10,height:8}}>
                  <div className={`progress-fill${pct>=100?' done':pct>0?'':' warn'}`} style={{width:`${pct}%`}}/>
                </div>
                <div style={{fontSize:11,color:'var(--gray2)',marginTop:5}}>{pct.toFixed(0)}% pagado al registrar</div>
              </>
            )}
          </div>

        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={onSave}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

function DetailModal({p,abonoVal,setAbonoVal,abonoFecha,setAbonoF,onAddAbono,onDelAbono,onEdit,onDelete,onClose}){
  const tv=totalVenta(p),ta=totalAbonado(p),sd=saldo(p),gn=ganancia(p);
  const pct=tv?Math.min(100,(ta/tv)*100):0;
  const fillCls=pct>=100?'done':pct>=50?'':'warn';
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <div>
            <h2>👤 {p.nombre}</h2>
            <div style={{fontSize:12,color:'var(--gray2)',marginTop:3}}>CC {p.cedula||'—'} · {p.telefono||'—'} · {p.ciudad||'—'}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>{Ic.x}</button>
        </div>
        <div className="modal-body">
          <div className="detail-section">
            <div className="detail-label">Resumen financiero</div>
            <div className="detail-grid">
              <IB label="Precio lentes"   val={fmt(p.precioLentes)}/>
              <IB label="Precio montura"  val={fmt(p.precioMontura)}/>
              <IB label="Montura"         val={p.montura||'—'}/>
              <IB label="Referencia"      val={p.referencia||'—'}/>
              <IB label="Total venta"     val={fmt(tv)}  color="var(--teal2)"/>
              <IB label="Costo lab."      val={fmt(p.costoLab)}/>
              <IB label="Costo montura"   val={fmt(p.costoMontura)}/>
              <IB label="Ganancia"        val={fmt(gn)}  color={gn>=0?'var(--amber2)':'var(--red)'}/>
              <IB label="Total abonado"   val={fmt(ta)}  color="var(--green)"/>
              <IB label="Saldo pendiente" val={fmt(Math.max(0,sd))} color={sd>0?'var(--red)':'var(--green)'}/>
              <div style={{display:'flex',flexDirection:'column',justifyContent:'center'}}>
                <Badge p={p}/>
                <div className="progress-bar" style={{marginTop:8}}><div className={`progress-fill ${fillCls}`} style={{width:`${pct}%`}}/></div>
                <div style={{fontSize:11,color:'var(--gray2)',marginTop:4}}>{pct.toFixed(0)}% pagado</div>
              </div>
            </div>
          </div>
          <div className="detail-section">
            <div className="detail-label">Fórmula óptica · {p.fechaVenta}</div>
            <table className="formula-table" style={{background:'var(--navy)',borderRadius:10}}>
              <thead><tr><th></th><th>Esfera</th><th>Cilindro</th><th>Eje</th><th>Adición</th></tr></thead>
              <tbody>
                {[['od','OD'],['oi','OI']].map(([eye,lbl])=>(
                  <tr key={eye}><td className="eye-label">{lbl}</td>
                    {['esfera','cilindro','eje','adicion'].map(k=>(
                      <td key={k} style={{textAlign:'center',color:p[eye][k]?'var(--white)':'var(--gray2)'}}>{p[eye][k]||'—'}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="detail-section">
            <div className="detail-label">Historial de abonos</div>
            {p.abonos.length===0?<div style={{color:'var(--gray2)',fontSize:13}}>Sin abonos registrados.</div>:(
              <div className="abono-list">
                {p.abonos.map(a=>(
                  <div key={a.id} className="abono-item">
                    <div className="abono-amount">{fmt(a.monto)}</div>
                    <div className="abono-date">{a.fecha}</div>
                    <button className="btn btn-danger btn-sm" onClick={()=>onDelAbono(p.id,a.id)}>{Ic.trash}</button>
                  </div>
                ))}
              </div>
            )}
            {sd>0&&(
              <div className="abono-row">
                <div className="form-group"><label>💵 Nuevo abono ($)</label><input type="number" value={abonoVal} onChange={e=>setAbonoVal(e.target.value)} placeholder="0"/></div>
                <div className="form-group"><label>Fecha</label><input type="date" value={abonoFecha} onChange={e=>setAbonoF(e.target.value)}/></div>
                <button className="btn btn-amber" onClick={onAddAbono} style={{flexShrink:0}}>{Ic.coin} Registrar</button>
              </div>
            )}
            {sd<=0&&tv>0&&(
              <div style={{marginTop:12,padding:'10px 14px',background:'rgba(34,197,94,0.1)',borderRadius:8,color:'var(--green)',fontSize:13,fontWeight:600}}>
                🎉 ¡Deuda saldada completamente!
              </div>
            )}
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-danger btn-sm" onClick={()=>{if(confirm('¿Eliminar?'))onDelete()}}>{Ic.trash} Eliminar</button>
          <div style={{flex:1}}/>
          <button className="btn btn-ghost" onClick={onClose}>Cerrar</button>
          <button className="btn btn-primary" onClick={onEdit}>{Ic.edit} Editar</button>
        </div>
      </div>
    </div>
  );
}

function IB({label,val,color}){
  return(
    <div className="detail-item">
      <div className="di-label">{label}</div>
      <div className="di-value" style={color?{color}:{}}>{val}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
